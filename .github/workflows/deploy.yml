name: Build and Deploy
env:
  NODE_VERSION: "24"

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build
        run: |
          git clone https://github.com/n-ce/ytify.git
          cd ytify
          npm install
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ytify/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
